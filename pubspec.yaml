name: lexis
description: An offline-first note-taking app with markdown support, folders, tags, pin/archive, full-text search, and an OLED dark minimal UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^14.8.1

  # Local database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  sqlite3: ^2.4.0
  path: ^1.9.1

  # Markdown
  flutter_markdown: ^0.7.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/lexis_icon.svg"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/lexis_icon.svg"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
