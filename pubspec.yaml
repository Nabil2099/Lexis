name: lexis
description: A private, offline-first knowledge vault for notes, ideas, tasks, journal entries, and references.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^14.8.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.1

  # Markdown
  flutter_markdown: ^0.7.4

  # Utilities
  google_fonts: ^6.3.2
  uuid: ^4.5.1
  intl: ^0.20.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.1.0
  local_auth: ^3.0.1
  file_picker: ^11.0.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.3
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/lexis_icon.png"
    background_color: "#050608"
    theme_color: "#0E7490"
  image_path: "assets/icon/lexis_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/lexis_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
